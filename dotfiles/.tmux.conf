# tmux + fzf config

set -g status off
set -g escape-time 0
set -g allow-passthrough on
set -g set-clipboard on
set -g extended-keys on

set -g set-titles on
set -g set-titles-string '[#S] #W'
set-option -g allow-rename off

set -g pane-border-style fg=black
set -g pane-active-border-style fg=brightblack
set -g pane-border-lines single

set -g mouse on
set -g mode-keys vi
set -ag terminal-overrides ',*:smcup@:rmcup@'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1

# sessions/repos through fzf
bind-key -n M-s display-popup -E -w 50% -h 70% "TMUX_WORKSPACE_FZF_HEIGHT=100% tmux-workspace project"
bind-key -n M-z display-popup -E -w 50% -h 70% "TMUX_WORKSPACE_FZF_HEIGHT=100% tmux-workspace zoxide"

# last session
bind-key -n M-a switch-client -l

# active tmux sessions through fzf (ctrl-d kills the highlighted session)
bind-key -n M-w display-popup -E -w 50% -h 70% "TMUX_WORKSPACE_FZF_HEIGHT=100% tmux-workspace sessions"

# windows; no splits
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-j next-window
bind-key -n M-k previous-window

bind-key c new-window -c "#{pane_current_path}"
bind s choose-tree -Zs
bind-key -T choose-tree x send-keys -X kill-session \; run-shell "tmux display-message 'Session Killed'"
set -g detach-on-destroy off
