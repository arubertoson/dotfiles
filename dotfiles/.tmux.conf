# tmux + fzf config

set -g status off
set -g default-terminal "tmux-256color"
set -sg escape-time 10
set -g allow-passthrough on
set -g set-clipboard on
set -g extended-keys on

set -g extended-keys-format csi-u

set -g set-titles on
set -g set-titles-string '[#S] #W'
set-option -g allow-rename off

set -g pane-border-style fg=black
set -g pane-active-border-style fg=brightblack
set -g pane-border-lines single

set -g mouse on
set -g mode-keys vi

# Truecolor and underline styles for Neovim themes/diagnostics
set -as terminal-features ',*:RGB:usstyle'

# Undercurl + underline colour support for diagnostics/spell highlights
set -as terminal-overrides ',*:Smulx=\E[4\072%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58\0722\072\072%p1%d\072%p2%d\072%p3%dm'

# Cursor shape changes from Neovim
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'

# Allow focus events through tmux
set -g focus-events on

set -ag terminal-overrides ',*:smcup@:rmcup@'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1

# sessions/repos through fzf
bind-key -n M-s display-popup -E -w 50% -h 70% "TMUX_WORKSPACE_FZF_HEIGHT=100% tmux-workspace project"
bind-key -n M-z display-popup -E -w 50% -h 70% "TMUX_WORKSPACE_FZF_HEIGHT=100% tmux-workspace zoxide"

# last session
bind-key -n M-a switch-client -l

# active tmux sessions through fzf (ctrl-d kills the highlighted session)
bind-key -n M-w display-popup -E -w 50% -h 70% "TMUX_WORKSPACE_FZF_HEIGHT=100% tmux-workspace sessions"

# windows; no splits
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-j next-window
bind-key -n M-k previous-window

bind-key c new-window -c "#{pane_current_path}"
bind-key R run-shell "tmux-workspace restore-path '#{pane_current_path}'"
bind s choose-tree -Zs
bind-key -T choose-tree x send-keys -X kill-session \; run-shell "tmux display-message 'Session Killed'"
set -g detach-on-destroy off
